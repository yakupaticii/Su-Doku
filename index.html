<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #F8F4EC, #EDE7DA, #E6DFD1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 48px 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }
        .icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #35598A, #1A3A6B);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 6px 20px rgba(53, 89, 138, 0.3);
        }
        .icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
        h1 {
            font-size: 30px;
            font-weight: 700;
            color: #1A1A1A;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px;
            font-weight: 500;
            color: #A09A90;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .links a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: white;
            border-radius: 14px;
            text-decoration: none;
            color: #2C2C2C;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }
        .links a .label {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .links a .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .links a .arrow {
            color: #C0B8A8;
            font-size: 13px;
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #C0B8A8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1.5" opacity="0.9"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5" opacity="0.7"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5" opacity="0.7"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5" opacity="0.9"/>
            </svg>
        </div>
        <h1>Sudoku</h1>
        <p class="subtitle">Classic Puzzle Game</p>
        <div class="links">
            <a href="privacy.html">
                <span class="label">
                    <span class="dot" style="background: #35598A;"></span>
                    Privacy Policy
                </span>
                <span class="arrow">&rsaquo;</span>
            </a>
            <a href="terms.html">
                <span class="label">
                    <span class="dot" style="background: #D4A843;"></span>
                    Terms of Use
                </span>
                <span class="arrow">&rsaquo;</span>
            </a>
        </div>
        <p class="footer">support@yakupaticii.com</p>
    </div>
</body>
</html>
